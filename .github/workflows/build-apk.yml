name: Mobile App Builder

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'アプリの表示名'
        default: 'My App'
        required: true
      app_id:
        description: 'パッケージ名 (com.example.app)'
        default: 'com.example.app'
        required: true
      source_type:
        description: '取得元 (local / github)'
        default: 'local'
        required: true
      source_path:
        description: 'アセットのパス'
        default: '/'
        required: false
      selected_files:
        description: '対象ファイル (カンマ区切り)'
        default: ''
        required: false
      app_icon_base64:
        description: 'アプリアイコン (Base64 PNG)'
        default: ''
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with: { node-version: 22 }

      - uses: actions/setup-java@v4
        with: { distribution: 'temurin', java-version: '17' }

      - name: Create package.json for Capacitor dependencies
        run: |
          printf '{"name":"web-to-native-app","version":"1.0.0","dependencies":{"@capacitor/core":"5.7.8","@capacitor/android":"5.7.8"},"devDependencies":{"@capacitor/cli":"5.7.8"}}' > package.json
          echo "--- package.json ---"
          cat package.json
          echo ""

      - name: Install Dependencies
        run: |
          ls -la package.json
          npm install --legacy-peer-deps

      - name: Extract Web Assets (Local)
        if: github.event.inputs.source_type == 'local'
        run: |
          rm -rf www www_temp
          mkdir www
          unzip -o www.zip -d www_temp
          # ネストされたフォルダ構造を自動フラット化
          if [ -f "www_temp/index.html" ]; then
            mv www_temp/* www/ 2>/dev/null || true
          else
            # サブフォルダ内にindex.htmlがある場合
            FOUND=$(find www_temp -name "index.html" -type f | head -1)
            if [ -n "$FOUND" ]; then
              TARGET_DIR=$(dirname "$FOUND")
              cp -R "$TARGET_DIR/." www/
            else
              cp -R www_temp/* www/ 2>/dev/null || true
            fi
          fi
          rm -rf www_temp
          echo "=== www/ contents ==="
          find www -type f | head -20

      - name: Checkout Source Repo (GitHub)
        if: github.event.inputs.source_type == 'github'
        uses: actions/checkout@v4
        with:
          path: source_repo_temp
          fetch-depth: 1

      - name: Copy Web Assets (GitHub)
        if: github.event.inputs.source_type == 'github'
        run: |
          rm -rf www
          mkdir www
          SOURCE_PATH="${{ github.event.inputs.source_path }}"
          SOURCE_PATH="${SOURCE_PATH#/}"
          SOURCE_PATH="${SOURCE_PATH%/}"
          SELECTED="${{ github.event.inputs.selected_files }}"
          
          echo "DEBUG: SOURCE_PATH=[$SOURCE_PATH]"
          echo "DEBUG: SELECTED=[$SELECTED]"
          
          if [ -n "$SELECTED" ]; then
            IFS=',' read -ra ADDR <<< "$SELECTED"
            for i in "${ADDR[@]}"; do
              i="$(echo "$i" | xargs)"
              if [ -z "$SOURCE_PATH" ]; then
                DEST="$i"
              else
                DEST="${i#$SOURCE_PATH/}"
              fi
              echo "Copying: source_repo_temp/$i -> www/$DEST"
              mkdir -p "www/$(dirname "$DEST")" || true
              if [ -d "source_repo_temp/$i" ]; then
                cp -R "source_repo_temp/$i/." "www/$DEST/" 2>/dev/null || cp -R "source_repo_temp/$i" "www/$DEST" || true
              else
                cp "source_repo_temp/$i" "www/$DEST" || true
              fi
            done
          else
            if [ -z "$SOURCE_PATH" ]; then
              shopt -s dotglob 2>/dev/null || true
              for item in source_repo_temp/*; do
                bname="$(basename "$item")"
                [ "$bname" = ".git" ] && continue
                [ "$bname" = ".github" ] && continue
                [ "$bname" = "node_modules" ] && continue
                cp -R "$item" "www/" || true
              done
            else
              cp -R "source_repo_temp/$SOURCE_PATH/." www/ || true
            fi
          fi
          
          echo "=== www/ contents ==="
          find www -type f | head -30
          echo "=== Total files: $(find www -type f | wc -l) ==="

      - name: Verify Web Assets
        run: |
          if [ ! -f "www/index.html" ]; then
            echo "::error::index.html not found in www/ directory!"
            echo "Contents of www/:"
            ls -laR www/ | head -50
            exit 1
          fi
          echo "✅ index.html found in www/"

      - name: Configure Capacitor
        run: |
          printf '{"appId":"%s","appName":"%s","webDir":"www"}' "${{ github.event.inputs.app_id }}" "${{ github.event.inputs.app_name }}" > capacitor.config.json
          echo "--- capacitor.config.json ---"
          cat capacitor.config.json

      - name: Android Platform Setup
        run: |
          echo "ANDROID_HOME=${ANDROID_HOME:-/usr/local/lib/android/sdk}" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=${ANDROID_HOME:-/usr/local/lib/android/sdk}" >> $GITHUB_ENV
          npx cap add android || true
          npx cap sync android

      - name: Set App Icon and PWA Manifest
        if: github.event.inputs.app_icon_base64 != ''
        run: |
          mkdir -p temp_icon
          echo "${{ github.event.inputs.app_icon_base64 }}" | base64 -d > temp_icon/icon.png
          RES_DIR="android/app/src/main/res"
          if [ -d "$RES_DIR" ]; then
            for dpi in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
              mkdir -p "$RES_DIR/mipmap-$dpi"
              cp temp_icon/icon.png "$RES_DIR/mipmap-$dpi/ic_launcher.png" || true
              cp temp_icon/icon.png "$RES_DIR/mipmap-$dpi/ic_launcher_round.png" || true
            done
          fi
          mkdir -p www/assets/icons
          cp temp_icon/icon.png www/assets/icons/icon.png || true
          printf '{"name":"%s","short_name":"%s","display":"standalone","icons":[{"src":"assets/icons/icon.png","sizes":"512x512","type":"image/png"}]}' "${{ github.event.inputs.app_name }}" "${{ github.event.inputs.app_name }}" > www/manifest.json

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "JAVA_HOME=$JAVA_HOME"
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app_name }}-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
