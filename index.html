<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Web Studio Pro</title>
    <style>
        :root { --bg: #212121; --sidebar: #171717; --primary: #3b82f6; --text: #ececec; --user-msg: #303030; --ai-msg: #212121; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, system-ui, sans-serif; margin: 0; height: 100dvh; display: flex; flex-direction: column; background: var(--bg); color: var(--text); overflow: hidden; }

        /* ナビゲーション */
        .tabs { display: flex; background: var(--sidebar); border-bottom: 1px solid #333; flex-shrink: 0; }
        .tab-btn { flex: 1; padding: 15px 0; border: none; background: none; font-size: 13px; font-weight: 600; color: #9b9b9b; cursor: pointer; transition: 0.2s; }
        .tab-btn.active { color: #fff; border-bottom: 2px solid #fff; }

        /* メインコンテンツ */
        .content { flex: 1; position: relative; overflow: hidden; display: flex; flex-direction: column; }
        .page { display: none; height: 100%; flex-direction: column; overflow: hidden; }
        .page.active { display: flex; }

        /* チャットエリア */
        #chat-log { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; background: var(--bg); }
        .msg { max-width: 90%; padding: 12px 16px; border-radius: 18px; font-size: 15px; line-height: 1.6; word-wrap: break-word; white-space: pre-wrap; }
        .user { align-self: flex-end; background: var(--user-msg); color: #fff; }
        .ai { align-self: flex-start; background: var(--ai-msg); border: 1px solid #333; width: 100%; }
        
        .spinner {
            width: 20px; height: 20px; border: 3px solid rgba(255, 255, 255, 0.2);
            border-top: 3px solid var(--primary); border-radius: 50%;
            animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; margin-right: 10px;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* 入力エリア */
        .input-container { padding: 15px; background: var(--bg); border-top: 1px solid #333; display: flex; flex-direction: column; gap: 10px; }
        .input-row { display: flex; gap: 10px; align-items: flex-end; }
        #user-prompt { flex: 1; min-height: 44px; max-height: 150px; background: #2f2f2f; border: 1px solid #444; border-radius: 22px; padding: 10px 20px; color: #fff; font-size: 16px; outline: none; resize: none; }
        
        .file-label { display: flex; align-items: center; justify-content: center; width: 44px; height: 44px; background: #333; border-radius: 50%; cursor: pointer; font-size: 20px; flex-shrink: 0; }
        #file-input { display: none; }
        #file-preview { display: none; width: 60px; height: 60px; border-radius: 8px; object-fit: cover; border: 1px solid var(--primary); }

        .send-btn { background: var(--primary); color: white; border: none; width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
        
        /* インラインのコード生成ボタン */
        .generate-btn-wrapper { margin-top: 15px; display: flex; justify-content: flex-end; }
        .generate-btn { background: #10b981; color: white; border: none; height: 36px; padding: 0 16px; border-radius: 18px; font-weight: bold; cursor: pointer; font-size: 13px; display: flex; align-items: center; gap: 6px; }

        /* エディタ */
        .editor-wrapper { flex: 1; position: relative; display: flex; }
        #code-editor { flex: 1; border: none; padding: 40px 15px 15px 15px; font-family: monospace; background: #0d0d0d; color: #d1d1d1; font-size: 14px; outline: none; resize: none; }
        .copy-button { position: absolute; top: 10px; right: 15px; background: rgba(255, 255, 255, 0.15); color: #fff; border: none; padding: 4px 8px; border-radius: 5px; cursor: pointer; font-size: 11px; z-index: 10; transition: background 0.2s; opacity: 0.8; }
        .copy-button:hover { background: rgba(255, 255, 255, 0.25); opacity: 1; }
        
        /* プレビュー */
        #preview-frame { flex: 1; border: none; background: #fff; width: 100%; height: 100%; }
        .debug-panel { background: var(--bg); border-top: 1px solid #333; padding: 12px 15px; display: flex; gap: 10px; align-items: flex-end; flex-shrink: 0; }
        #debug-memo { flex: 1; min-height: 40px; max-height: 100px; background: #2f2f2f; border: 1px solid #444; border-radius: 20px; padding: 10px 15px; color: #fff; font-size: 14px; outline: none; resize: none; }
        .debug-btn { background: #eab308; color: #000; border: none; height: 40px; padding: 0 16px; border-radius: 20px; font-weight: bold; cursor: pointer; flex-shrink: 0; font-size: 13px; }

        /* 設定 */
        .settings { padding: 25px; overflow-y: auto; }
        .field { margin-bottom: 20px; }
        label { display: block; font-size: 12px; color: #888; margin-bottom: 8px; font-weight: bold; }
        input[type="password"], textarea.setting-input { width: 100%; background: #2f2f2f; border: 1px solid #444; border-radius: 8px; padding: 12px; color: #fff; font-size: 14px; resize: vertical; }
        .save-btn { background: #fff; color: #000; border: none; padding: 15px; border-radius: 8px; font-weight: bold; width: 100%; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div class="tabs">
    <button class="tab-btn active" onclick="showPage('chat', this)">CHAT</button>
    <button class="tab-btn" onclick="showPage('editor', this)">CODE</button>
    <button class="tab-btn" onclick="showPage('preview', this)">PREVIEW</button>
    <button class="tab-btn" onclick="showPage('settings', this)">SET</button>
</div>

<div class="content">
    <div id="p-chat" class="page active">
        <div id="chat-log">
            <div class="msg ai">Gemini Web Studio 起動。\nここでは要件の壁打ちを行います。仕様が固まったら表示される「⚡️コードを作成」ボタンを押してください。</div>
        </div>
        <div class="input-container">
            <img id="file-preview">
            <div class="input-row">
                <label class="file-label" for="file-input">＋</label>
                <input type="file" id="file-input" accept="image/*" onchange="previewFile()">
                <textarea id="user-prompt" placeholder="作りたいアプリの要件を伝える..." rows="1" oninput="autoGrow(this)"></textarea>
                <button class="send-btn" id="send-btn" onclick="askGemini()">↑</button>
            </div>
        </div>
    </div>

    <div id="p-editor" class="page">
        <div class="editor-wrapper">
            <textarea id="code-editor" spellcheck="false" oninput="updatePreview()"></textarea>
            <button id="copy-btn" class="copy-button" onclick="copyCode()">Copy</button>
        </div>
    </div>

    <div id="p-preview" class="page">
        <iframe id="preview-frame"></iframe>
        <div class="debug-panel">
            <textarea id="debug-memo" placeholder="修正点やデバッグ内容をメモ..." rows="1" oninput="autoGrow(this)"></textarea>
            <button class="debug-btn" onclick="sendDebugRequest()">依頼に反映</button>
        </div>
    </div>

    <div id="p-settings" class="page settings">
        <div class="field">
            <label>API KEY</label>
            <input type="password" id="api-key" placeholder="AIzaSy...">
        </div>
        <div class="field">
            <label>DEVELOPER PROFILE</label>
            <textarea id="user-profile" class="setting-input" rows="6" placeholder="例：Tailwind CSSを使用。日本語コメント。モダンなダークモード。"></textarea>
        </div>
        <button class="save-btn" onclick="saveSettings()">設定を保存</button>
    </div>
</div>

<script>
    let currentImageBase64 = null;
    let conversationContext = ""; 
    const pagesList = ['chat', 'editor', 'preview', 'settings'];

    function showPage(id, btn) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('p-' + id).classList.add('active');
        if (btn) btn.classList.add('active');
        if(id === 'preview') updatePreview();
    }

    function autoGrow(element) {
        element.style.height = "5px";
        element.style.height = (element.scrollHeight) + "px";
    }

    function previewFile() {
        const file = document.getElementById('file-input').files[0];
        const reader = new FileReader();
        reader.onloadend = () => {
            currentImageBase64 = reader.result.split(',')[1];
            const preview = document.getElementById('file-preview');
            preview.src = reader.result;
            preview.style.display = 'block';
        };
        if (file) reader.readAsDataURL(file);
    }

    window.onload = () => {
        document.getElementById('api-key').value = localStorage.getItem('g_key') || '';
        document.getElementById('user-profile').value = localStorage.getItem('g_prof') || '';
    };

    function saveSettings() {
        localStorage.setItem('g_key', document.getElementById('api-key').value);
        localStorage.setItem('g_prof', document.getElementById('user-profile').value);
        alert('設定を保存しました');
    }

    function updatePreview() {
        document.getElementById('preview-frame').srcdoc = document.getElementById('code-editor').value;
    }

    // --- 要件固めのチャット用関数 (ストリーミング対応 + ボタン動的追加) ---
    async function askGemini() {
        const key = document.getElementById('api-key').value;
        const prof = document.getElementById('user-profile').value;
        const input = document.getElementById('user-prompt');
        const promptText = input.value.trim();
        
        if(!key || !promptText) return alert('APIキーとメッセージを確認してください');

        const log = document.getElementById('chat-log');
        
        // 過去の生成ボタンがあれば削除しておく
        document.querySelectorAll('.generate-btn-wrapper').forEach(el => el.remove());

        const userMsg = document.createElement('div');
        userMsg.className = 'msg user';
        userMsg.textContent = promptText; 
        log.appendChild(userMsg);

        const aiMsg = document.createElement('div');
        aiMsg.className = 'msg ai';
        // 初期のクルクル表示
        aiMsg.innerHTML = '<div style="display:flex;align-items:center;"><div class="spinner"></div><span>考え中...</span></div>';
        log.appendChild(aiMsg);
        
        input.value = '';
        input.style.height = "44px";
        document.getElementById('file-preview').style.display = 'none';
        log.scrollTop = log.scrollHeight;

        conversationContext += `\nユーザー: ${promptText}`;

        const system = `あなたはプロのWeb開発ディレクター兼アシスタントです。ユーザーの作りたいWebアプリの要件をヒアリングし、仕様を整理してください。
開発プロファイル: ${prof}

【重要ルール】
1. 応答は長々と話さず、要点を箇条書きで簡潔にまとめてください。
2. ユーザーの入力の粒度や複雑さに応じて、臨機応変に文字数や情報量を調整してください。一度に情報を詰め込みすぎず、対話のキャッチボールを重視してください。
3. ここではコードそのものは出力せず、仕様についての提案、質問、確認を自然な日本語で行ってください。`;
        
        const contents = [{ 
            parts: [{ text: system + "\n\nこれまでの会話:" + conversationContext }] 
        }];

        if (currentImageBase64) {
            contents[0].parts.push({
                inline_data: { mime_type: "image/png", data: currentImageBase64 }
            });
        }

        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:streamGenerateContent?alt=sse&key=${key}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents })
            });
            
            if(!res.ok) {
                const errData = await res.json();
                throw new Error(errData.error?.message || '通信エラー');
            }

            const reader = res.body.getReader();
            const decoder = new TextDecoder("utf-8");
            let aiText = "";
            let buffer = "";
            aiMsg.innerHTML = ""; // ストリーミング開始前にクルクルを消去

            while (true) {
                const { value, done } = await reader.read();
                if (done) break;
                
                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop(); 
                
                for (const line of lines) {
                    if (line.startsWith('data: ')) {
                        const dataStr = line.slice(6);
                        if (dataStr.trim() === "[DONE]") continue; 
                        try {
                            const data = JSON.parse(dataStr);
                            const textChunk = data.candidates?.[0]?.content?.parts?.[0]?.text;
                            if (textChunk) {
                                aiText += textChunk;
                                aiMsg.textContent = aiText; // 画面を逐次更新
                                log.scrollTop = log.scrollHeight; 
                            }
                        } catch (e) {
                            // パース中のエラーは無視
                        }
                    }
                }
            }
            
            // --- ストリーミング完了後の処理 ---
            aiMsg.textContent = aiText; // テキストを再設定
            conversationContext += `\nアシスタント: ${aiText}`;

            // メッセージの末尾に「コードを作成」ボタンを追加
            const btnWrapper = document.createElement('div');
            btnWrapper.className = 'generate-btn-wrapper';
            
            const genBtn = document.createElement('button');
            genBtn.className = 'generate-btn';
            genBtn.innerHTML = '⚡️ コードを作成';
            genBtn.onclick = generateCode;
            
            btnWrapper.appendChild(genBtn);
            aiMsg.appendChild(btnWrapper);
            
            log.scrollTop = log.scrollHeight;
            
            // 添付画像をクリア
            currentImageBase64 = null;
            document.getElementById('file-input').value = "";
            
        } catch (e) {
            aiMsg.textContent = 'エラー: ' + e.message;
        } finally {
            log.scrollTop = log.scrollHeight;
        }
    }

    // --- コード生成用の関数 ---
    async function generateCode() {
        const key = document.getElementById('api-key').value;
        const prof = document.getElementById('user-profile').value;
        const code = document.getElementById('code-editor').value;

        if(!key) return alert('APIキーを設定画面で入力してください');

        const log = document.getElementById('chat-log');
        
        // 過去のボタンを消しておく
        document.querySelectorAll('.generate-btn-wrapper').forEach(el => el.remove());
        
        const sysMsg = document.createElement('div');
        sysMsg.className = 'msg user';
        sysMsg.style.backgroundColor = '#10b981';
        sysMsg.textContent = '⚡️ これまでの要件をもとにコード生成を実行'; 
        log.appendChild(sysMsg);

        const aiMsg = document.createElement('div');
        aiMsg.className = 'msg ai';
        aiMsg.innerHTML = '<div style="display:flex;align-items:center;"><div class="spinner"></div><span>コードを生成中...</span></div>';
        log.appendChild(aiMsg);
        log.scrollTop = log.scrollHeight;

        const system = `あなたはExpert Web Developerです。これまでの要件定義の会話履歴をもとに、要件を満たす完全なHTMLコードを生成してください。
開発プロファイル: ${prof}
現在のコード: ${code || "なし"}

これまでの会話履歴（要件）:
${conversationContext || "まだ会話はありません。一般的なモダンなWebページのテンプレートを作成してください。"}

指示:
- <!DOCTYPE html>から始まる1つの完全なHTMLコードのみを出力してください。
- HTML、CSS、JSはすべて1つのファイルにまとめてください。
- markdownのコードブロック表記 (\`\`\`html など) や、説明文・挨拶は一切含めず、純粋なコードのみを出力してください。`;

        const contents = [{ parts: [{ text: system }] }];

        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents })
            });
            const data = await res.json();
            
            if(data.error) throw new Error(data.error.message);
            
            let result = data.candidates[0].content.parts[0].text.replace(/```[a-z]*\n?/g, '').replace(/```/g, '').trim();
            document.getElementById('code-editor').value = result;
            
            aiMsg.innerHTML = '✨ 生成が完了しました。プレビューを確認してください。';
            
            showPage('preview', document.querySelectorAll('.tab-btn')[2]);
            
        } catch (e) {
            aiMsg.textContent = '生成エラー: ' + e.message;
        } finally {
            log.scrollTop = log.scrollHeight;
        }
    }

    // --- プレビュー画面のデバッグ依頼関数 ---
    function sendDebugRequest() {
        const memoInput = document.getElementById('debug-memo');
        const memoText = memoInput.value.trim();
        
        if (!memoText) return alert('修正点やデバッグ内容をメモに入力してください。');
        
        showPage('chat', document.querySelectorAll('.tab-btn')[0]);
        
        const chatInput = document.getElementById('user-prompt');
        chatInput.value = `【修正・デバッグ依頼】\n現在のプレビューに対して、以下の修正をお願いします：\n${memoText}`;
        autoGrow(chatInput);
        
        memoInput.value = '';
        memoInput.style.height = "40px";
    }

    function copyCode() {
        const codeEditor = document.getElementById('code-editor');
        const copyBtn = document.getElementById('copy-btn');
        codeEditor.select();
        codeEditor.setSelectionRange(0, codeEditor.value.length);

        navigator.clipboard.writeText(codeEditor.value).then(() => {
            const originalText = copyBtn.textContent;
            copyBtn.textContent = 'Copied!';
            setTimeout(() => copyBtn.textContent = originalText, 2000);
        }).catch(err => {
            try {
                document.execCommand('copy');
                const originalText = copyBtn.textContent;
                copyBtn.textContent = 'Copied!';
                setTimeout(() => copyBtn.textContent = originalText, 2000);
            } catch (fallbackErr) {
                alert('コピーに失敗しました。');
            }
        });
    }

    // --- スワイプ処理 ---
    let touchStartX = 0;
    let touchStartY = 0;

    document.addEventListener('touchstart', e => {
        touchStartX = e.changedTouches[0].screenX;
        touchStartY = e.changedTouches[0].screenY;
    }, {passive: true});

    document.addEventListener('touchend', e => {
        const touchEndX = e.changedTouches[0].screenX;
        const touchEndY = e.changedTouches[0].screenY;
        handleSwipe(touchStartX, touchStartY, touchEndX, touchEndY);
    }, {passive: true});

    function handleSwipe(startX, startY, endX, endY) {
        const dx = endX - startX;
        const dy = endY - startY;
        const activePage = document.querySelector('.page.active');
        if(!activePage) return;
        
        const currentIndex = pagesList.indexOf(activePage.id.replace('p-', ''));

        if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy)) {
            if (dx < 0 && currentIndex < pagesList.length - 1) {
                showPage(pagesList[currentIndex + 1], document.querySelectorAll('.tab-btn')[currentIndex + 1]);
            } else if (dx > 0 && currentIndex > 0) {
                showPage(pagesList[currentIndex - 1], document.querySelectorAll('.tab-btn')[currentIndex - 1]);
            }
        }
    }
</script>
</body>
</html>
