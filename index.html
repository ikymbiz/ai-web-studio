<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile AI Studio</title>
    <style>
        :root { --primary: #4a90e2; --bg: #f0f2f5; --dark: #1e1e1e; }
        * { box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; height: 100vh; display: flex; flex-direction: column; background: var(--bg); overflow: hidden; }

        /* ヘッダー・タブ */
        .tabs { display: flex; background: #fff; border-bottom: 1px solid #ddd; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: none; font-size: 14px; font-weight: bold; color: #666; cursor: pointer; }
        .tab-btn.active { color: var(--primary); border-bottom: 3px solid var(--primary); }

        /* コンテンツエリア */
        .content-area { flex: 1; position: relative; overflow: hidden; }
        .page { display: none; height: 100%; width: 100%; position: absolute; }
        .page.active { display: flex; flex-direction: column; }

        /* 設定ページ */
        .settings-page { padding: 20px; overflow-y: auto; }
        
        /* チャットページ */
        #chat-log { flex: 1; padding: 15px; overflow-y: auto; background: #f9f9f9; font-size: 14px; }
        .input-group { padding: 10px; background: #fff; border-top: 1px solid #ddd; display: flex; gap: 8px; }
        #user-prompt { flex: 1; height: 50px; padding: 8px; border: 1px solid #ccc; border-radius: 8px; font-size: 14px; }

        /* エディタページ */
        #code-editor { flex: 1; width: 100%; border: none; padding: 15px; font-family: monospace; font-size: 14px; background: var(--dark); color: #fff; outline: none; resize: none; }

        /* プレビューページ */
        #preview-frame { flex: 1; width: 100%; border: none; background: white; }

        /* 共通パーツ */
        .msg { margin-bottom: 12px; padding: 8px; border-radius: 8px; }
        .user-msg { background: #e3f2fd; align-self: flex-end; }
        .ai-msg { background: #eee; font-size: 12px; }
        button.main-btn { background: var(--primary); color: white; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; }
        label { font-size: 12px; font-weight: bold; margin-bottom: 4px; display: block; }
        input, textarea { border-radius: 8px; border: 1px solid #ccc; padding: 10px; margin-bottom: 15px; width: 100%; }
    </style>
</head>
<body>

<div class="tabs">
    <button class="tab-btn active" onclick="showPage('chat')">AI対話</button>
    <button class="tab-btn" onclick="showPage('editor')">コード</button>
    <button class="tab-btn" onclick="showPage('preview')">実行</button>
    <button class="tab-btn" onclick="showPage('settings')">設定</button>
</div>

<div class="content-area">
    <div id="page-chat" class="page active">
        <div id="chat-log">
            <div class="msg ai-msg">こんにちは！どんなアプリを作りますか？設定タブでAPIキーを入れてから指示してください。</div>
        </div>
        <div class="input-group">
            <textarea id="user-prompt" placeholder="例：計算機を作って"></textarea>
            <button class="main-btn" id="send-btn" onclick="askGemini()">送信</button>
        </div>
    </div>

    <div id="page-editor" class="page">
        <textarea id="code-editor" spellcheck="false" oninput="updatePreview()" placeholder="ここにコードが表示されます。直接編集も可能です。"></textarea>
    </div>

    <div id="page-preview" class="page">
        <iframe id="preview-frame"></iframe>
    </div>

    <div id="page-settings" class="page settings-page">
        <label>Gemini API Key</label>
        <input type="password" id="api-key" placeholder="AIzaSy...">
        <label>あなたのプロファイル</label>
        <textarea id="user-profile" rows="5" placeholder="例：iPhoneっぽい角丸デザインが好き。Vanilla JSのみ使用。"></textarea>
        <button class="main-btn" onclick="saveSettings()" style="width: 100%;">設定を保存</button>
    </div>
</div>

<script>
    // ページ切り替え
    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('page-' + pageId).classList.add('active');
        event.target.classList.add('active');
        
        if(pageId === 'preview') updatePreview();
    }

    window.onload = () => {
        document.getElementById('api-key').value = localStorage.getItem('gemini_api_key') || '';
        document.getElementById('user-profile').value = localStorage.getItem('user_profile') || '';
    };

    function saveSettings() {
        localStorage.setItem('gemini_api_key', document.getElementById('api-key').value);
        localStorage.setItem('user_profile', document.getElementById('user_profile').value);
        alert('保存完了');
    }

    function updatePreview() {
        const code = document.getElementById('code-editor').value;
        document.getElementById('preview-frame').srcdoc = code;
    }

    async function askGemini() {
        const apiKey = document.getElementById('api-key').value;
        const profile = document.getElementById('user-profile').value;
        const prompt = document.getElementById('user-prompt').value;
        const currentCode = document.getElementById('code-editor').value;

        if (!apiKey) return alert('設定でAPIキーを入力してください');
        if (!prompt) return;

        const log = document.getElementById('chat-log');
        log.innerHTML += `<div class="msg user-msg">${prompt}</div>`;
        const aiStatus = document.createElement('div');
        aiStatus.className = 'msg ai-msg';
        aiStatus.innerText = '生成中...';
        log.appendChild(aiStatus);
        log.scrollTop = log.scrollHeight;

        const system = `Webエンジニアとして、以下のプロファイルと現在のコードを元に、指示された修正を反映した完全なHTML(CSS/JS含む)を出力してください。説明不要。コードのみ。\nプロファイル:${profile}\n現在のコード:${currentCode}`;

        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: system + "\n指示:" + prompt }] }] })
            });
            const data = await res.json();
            let code = data.candidates[0].content.parts[0].text.replace(/```html|```/g, '').trim();
            
            document.getElementById('code-editor').value = code;
            aiStatus.innerText = '生成完了！「実行」タブで確認してください。';
            // スマホだと自動切り替えが親切
            setTimeout(() => showPage('preview'), 1000);
        } catch (e) {
            aiStatus.innerText = 'エラー：' + e.message;
        }
    }
</script>
</body>
</html>
