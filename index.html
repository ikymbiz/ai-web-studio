<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Studio - Gemini 2.5 Flash Edition</title>
    <style>
        :root { --primary: #007bff; --bg: #f8f9fa; --dark: #121212; --msg-user: #007bff; --msg-ai: #e9ecef; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            margin: 0; height: 100dvh; display: flex; flex-direction: column; 
            background: var(--bg); overflow: hidden; 
        }

        /* タブ */
        .tabs { display: flex; background: #fff; border-bottom: 1px solid #dee2e6; flex-shrink: 0; }
        .tab-btn { flex: 1; padding: 14px 0; border: none; background: none; font-size: 13px; font-weight: 600; color: #6c757d; }
        .tab-btn.active { color: var(--primary); border-bottom: 3px solid var(--primary); }

        /* コンテンツ */
        .content { flex: 1; position: relative; overflow: hidden; display: flex; flex-direction: column; }
        .page { display: none; height: 100%; flex-direction: column; }
        .page.active { display: flex; }

        /* チャット */
        #chat-log { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 85%; padding: 10px 14px; border-radius: 15px; font-size: 14px; line-height: 1.5; word-wrap: break-word; }
        .user { align-self: flex-end; background: var(--msg-user); color: white; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: var(--msg-ai); color: #333; border-bottom-left-radius: 2px; }
        
        .input-box { padding: 10px; background: #fff; border-top: 1px solid #dee2e6; display: flex; gap: 8px; }
        #user-prompt { flex: 1; height: 45px; border: 1px solid #ced4da; border-radius: 20px; padding: 10px 15px; font-size: 16px; resize: none; outline: none; }

        /* エディタ */
        #code-editor { flex: 1; border: none; padding: 15px; font-family: 'Fira Code', 'Courier New', monospace; font-size: 13px; background: var(--dark); color: #adbac7; outline: none; resize: none; }

        /* プレビュー */
        #preview-frame { flex: 1; border: none; background: white; }

        /* 設定 */
        .settings { padding: 20px; overflow-y: auto; }
        .field { margin-bottom: 20px; }
        label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 6px; color: #495057; }
        input, textarea { width: 100%; border: 1px solid #ced4da; border-radius: 8px; padding: 12px; font-size: 14px; }
        
        .btn { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; }
        .btn:disabled { opacity: 0.5; }
    </style>
</head>
<body>

<div class="tabs">
    <button class="tab-btn active" onclick="showPage('chat', this)">CHAT</button>
    <button class="tab-btn" onclick="showPage('editor', this)">CODE</button>
    <button class="tab-btn" onclick="showPage('preview', this)">RUN</button>
    <button class="tab-btn" onclick="showPage('settings', this)">SET</button>
</div>

<div class="content">
    <div id="p-chat" class="page active">
        <div id="chat-log"><div class="msg ai">Gemini 2.5 Flash 準備完了。何を作りましょうか？</div></div>
        <div class="input-box">
            <textarea id="user-prompt" placeholder="指示を入力..."></textarea>
            <button class="btn" id="send-btn" style="width: auto; padding: 0 20px;" onclick="askGemini()">送信</button>
        </div>
    </div>

    <div id="p-editor" class="page">
        <textarea id="code-editor" spellcheck="false" oninput="updatePreview()"></textarea>
    </div>

    <div id="p-preview" class="page">
        <iframe id="preview-frame"></iframe>
    </div>

    <div id="p-settings" class="page settings">
        <div class="field">
            <label>Gemini API Key</label>
            <input type="password" id="api-key" placeholder="AIzaSy...">
        </div>
        <div class="field">
            <label>開発プロファイル</label>
            <textarea id="user-profile" rows="5" placeholder="例：モダンなUI。Vanilla JS。Tailwind CSS使用。"></textarea>
        </div>
        <button class="btn" onclick="saveSettings()">設定を保存</button>
    </div>
</div>

<script>
    function showPage(id, btn) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('p-' + id).classList.add('active');
        btn.classList.add('active');
        if(id === 'preview') updatePreview();
    }

    window.onload = () => {
        document.getElementById('api-key').value = localStorage.getItem('g_key') || '';
        document.getElementById('user-profile').value = localStorage.getItem('g_prof') || '';
    };

    function saveSettings() {
        localStorage.setItem('g_key', document.getElementById('api-key').value);
        localStorage.setItem('g_prof', document.getElementById('user-profile').value);
        alert('Saved!');
    }

    function updatePreview() {
        document.getElementById('preview-frame').srcdoc = document.getElementById('code-editor').value;
    }

    async function askGemini() {
        const key = document.getElementById('api-key').value;
        const prof = document.getElementById('user-profile').value;
        const input = document.getElementById('user-prompt');
        const code = document.getElementById('code-editor').value;
        
        if(!key || !input.value) return alert('APIキーと指示を確認してください');

        const log = document.getElementById('chat-log');
        log.innerHTML += `<div class="msg user">${input.value}</div>`;
        const aiMsg = document.createElement('div');
        aiMsg.className = 'msg ai';
        aiMsg.innerText = '生成中...';
        log.appendChild(aiMsg);
        
        const currentPrompt = input.value;
        input.value = '';
        input.blur();
        log.scrollTop = log.scrollHeight;

        // Gemini 2.5 Flash 用の最適化プロンプト
        const system = `You are an expert web developer. 
Profile: ${prof}
Current Code: ${code || "None"}
Task: Update the code based on: ${currentPrompt}
Constraint: Return ONLY the full HTML code starting with <!DOCTYPE html>. No explanation. No markdown code blocks.`;

        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: system }] }] })
            });
            const data = await res.json();
            
            if(data.error) throw new Error(data.error.message);
            
            let result = data.candidates[0].content.parts[0].text.replace(/```html|```/g, '').trim();
            document.getElementById('code-editor').value = result;
            aiMsg.innerText = '生成完了。RUNタブを確認してください。';
            
            setTimeout(() => showPage('preview', document.querySelector('[onclick*="preview"]')), 1000);
        } catch (e) {
            aiMsg.innerText = 'Error: ' + e.message;
        }
    }
</script>
</body>
</html>
